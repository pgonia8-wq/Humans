<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>H humans</title>
    <meta name="description" content="Mini App H - Human App dentro de World App" />
    
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #000000;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow: hidden;
      }

      #initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        z-index: 9999;
        transition: opacity 0.4s ease-out;
      }

      .spinner {
        width: 56px;
        height: 56px;
        border: 6px solid rgba(255, 255, 255, 0.2);
        border-top: 6px solid #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .loading-text {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 8px;
      }

      .loading-subtext {
        font-size: 14px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <!-- LOADING INMEDIATO - Se ve desde el primer milisegundo -->
    <div id="initial-loading">
      <div class="spinner"></div>
      <div class="loading-text">Cargando H humans...</div>
      <div class="loading-subtext">Esto puede tomar unos segundos la primera vez</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Ocultar el loading cuando la app React esté lista
      function hideLoading() {
        const loading = document.getElementById('initial-loading');
        if (loading) {
          loading.style.opacity = '0';
          setTimeout(() => {
            loading.style.display = 'none';
          }, 400);
        }
      }

      // Ocultar cuando la ventana cargue
      window.addEventListener('load', hideLoading);

      // Backup: ocultar después de 8 segundos máximo (por si algo falla)
      setTimeout(hideLoading, 8000);
    </script>
  </body>
</html>
